<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="controls 10px · cards 14px · badges pill" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
</head>
<body style="margin:0;padding:16px;display:flex;gap:16px;align-items:flex-end;">
<div style="display:flex;flex-direction:column;gap:4px;align-items:center;"><div style="width:72px;height:72px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--muted);"></div><span style="font-size:11px;color:var(--text-muted);">sm 6 · chips</span></div>
<div style="display:flex;flex-direction:column;gap:4px;align-items:center;"><div style="width:72px;height:72px;border-radius:var(--radius-md);border:1px solid var(--border);background:var(--muted);"></div><span style="font-size:11px;color:var(--text-muted);">md 8 · tabs, nav</span></div>
<div style="display:flex;flex-direction:column;gap:4px;align-items:center;"><div style="width:72px;height:72px;border-radius:var(--radius-control);border:1px solid var(--border);background:var(--muted);"></div><span style="font-size:11px;color:var(--text-muted);">control 10 · buttons</span></div>
<div style="display:flex;flex-direction:column;gap:4px;align-items:center;"><div style="width:72px;height:72px;border-radius:var(--radius-card);box-shadow:var(--card-ring),var(--shadow-xs);background:var(--card);"></div><span style="font-size:11px;color:var(--text-muted);">card 14</span></div>
<div style="display:flex;flex-direction:column;gap:4px;align-items:center;"><div style="width:72px;height:28px;border-radius:var(--radius-full);background:var(--ob-green-500);"></div><span style="font-size:11px;color:var(--text-muted);">full · badges</span></div>
</body>
</html>
