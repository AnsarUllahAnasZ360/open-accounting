<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
</head>
<body style="margin:0;padding:16px;display:flex;gap:16px;align-items:stretch;">
<div style="flex:1.6;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:var(--radius-card);padding:12px;">
  <img src="../assets/logo/openbooks-logo.png" alt="OpenBooks logo" style="max-width:100%;max-height:150px;">
</div>
<div style="flex:1;display:flex;flex-direction:column;gap:8px;">
  <div style="flex:1;display:flex;align-items:center;justify-content:center;gap:14px;border:1px solid var(--border);border-radius:var(--radius-card);">
    <img src="../assets/logo/openbooks-mark.png" alt="mark" style="width:56px;height:56px;">
    <img src="../assets/logo/openbooks-mark.png" alt="mark small" style="width:28px;height:28px;">
  </div>
  <p style="font-size:11px;color:var(--text-muted);line-height:1.5;">Mark at 28px in the sidebar, 40px in auth screens. Wordmark is lowercase "open books", Geist semibold when set in text.</p>
</div>
</body>
</html>
