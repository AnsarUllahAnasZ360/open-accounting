<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body style="margin:0;padding:16px;background:var(--surface-page);">
<div id="root"></div>
<script type="text/babel">
const { Input, Select, Switch } = window.OpenBooksDesignSystem_8d97bf;

function Row({ label, children }) {
  return (
    <div style={{ display: "grid", gridTemplateColumns: "150px 1fr", alignItems: "center", gap: 12 }}>
      <span style={{ fontSize: "var(--text-xs)", color: "var(--text-muted)", fontWeight: 500 }}>{label}</span>
      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>{children}</div>
    </div>
  );
}

function Demo() {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12, maxWidth: 640 }}>
      <Row label="Input"><Input placeholder="Vendor name" /></Row>
      <Row label="Search"><Input icon="search" placeholder="Search transactions" /></Row>
      <Row label="Disabled"><Input placeholder="Account number" disabled /></Row>
      <Row label="Select">
        <Select options={["Last 30 days", "This quarter", "Year to date", "Custom range"]} defaultValue="This quarter" />
        <Select placeholder="Choose category" options={[
          { value: "6010", label: "Software & AI tools" },
          { value: "6020", label: "Contractor labor" },
          { value: "6030", label: "Bank fees" },
        ]} />
      </Row>
      <Row label="Switch">
        <Switch defaultChecked />
        <Switch />
        <Switch size="sm" defaultChecked />
        <Switch disabled />
      </Row>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
