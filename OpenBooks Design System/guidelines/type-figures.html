<!-- @dsCard group="Type" viewport="700x190" name="Figures" subtitle="Geist Mono tabular numerals — every amount in the product" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
</head>
<body style="margin:0;padding:16px;display:flex;gap:32px;align-items:flex-start;">
<div style="display:flex;flex-direction:column;gap:4px;">
  <span style="font-size:11px;color:var(--text-muted);">Dashboard metric — 30/600, −0.01em</span>
  <span style="font-family:var(--font-figures);font-feature-settings:'tnum' 1;font-size:var(--text-3xl);font-weight:var(--weight-semibold);letter-spacing:-0.01em;">$128.4K</span>
  <span style="font-size:11px;color:var(--text-muted);margin-top:8px;">Hero figure — 36/600</span>
  <span style="font-family:var(--font-figures);font-feature-settings:'tnum' 1;font-size:var(--text-4xl);font-weight:var(--weight-semibold);letter-spacing:-0.01em;">$1,284,920.55</span>
</div>
<div style="display:flex;flex-direction:column;gap:2px;font-family:var(--font-figures);font-feature-settings:'tnum' 1;font-size:var(--text-sm);text-align:right;min-width:130px;">
  <span style="font-size:11px;color:var(--text-muted);font-family:var(--font-sans);text-align:left;">Table column — aligned decimals</span>
  <span>$4,892.14</span>
  <span style="color:var(--negative);">−$1,850.00</span>
  <span style="color:var(--positive);">+$5,500.00</span>
  <span>$248.00</span>
  <span style="border-top:1px solid var(--border);margin-top:2px;padding-top:2px;font-weight:500;">$6,790.14</span>
</div>
</body>
</html>
