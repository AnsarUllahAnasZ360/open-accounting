<!-- @dsCard group="OpenBooks App" viewport="1280x800" name="OpenBooks app" subtitle="Dashboard · Inbox · Transactions · Cash flow · Reports — click through via the sidebar" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>OpenBooks</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { height: 100%; }
  body { overflow: hidden; }
  .ob-app { display: flex; height: 100vh; }
  .ob-main { flex: 1; overflow-y: auto; }
  .ob-page { max-width: var(--content-max); margin: 0 auto; padding: 24px 32px 48px; display: flex; flex-direction: column; gap: 20px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="./Dashboard.jsx"></script>
<script type="text/babel" src="./Inbox.jsx"></script>
<script type="text/babel" src="./Transactions.jsx"></script>
<script type="text/babel" src="./CashFlow.jsx"></script>
<script type="text/babel" src="./Reports.jsx"></script>
<script type="text/babel">
const { SideNav, PageHeader, Card, CardHeader, CardTitle, CardDescription, CardContent, Button, Switch, Icon, Badge } = window.OpenBooksDesignSystem_8d97bf;

function OBSettings() {
  const accounts = [
    { name: "Mercury Checking", kind: "Bank · Plaid", icon: "landmark" },
    { name: "Chase Business Savings", kind: "Bank · Plaid", icon: "landmark" },
    { name: "Stripe — Main", kind: "Payments · Stripe", icon: "credit-card" },
  ];
  return (
    <div className="ob-page">
      <PageHeader title="Settings" description="Connected accounts, rules, and company details" />
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, alignItems: "start" }}>
        <Card>
          <CardHeader>
            <CardTitle>Connected accounts</CardTitle>
            <CardDescription>Add as many banks and Stripe accounts as you need</CardDescription>
          </CardHeader>
          <CardContent style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {accounts.map((a) => (
              <div key={a.name} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ display: "flex", alignItems: "center", justifyContent: "center", width: 32, height: 32, borderRadius: "var(--radius-md)", border: "1px solid var(--border)", color: "var(--text-secondary)" }}><Icon name={a.icon} size={16} /></span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: "var(--text-sm)", fontWeight: 500 }}>{a.name}</div>
                  <div style={{ fontSize: "var(--text-xs)", color: "var(--text-muted)" }}>{a.kind}</div>
                </div>
                <Badge variant="info">Synced</Badge>
              </div>
            ))}
            <div style={{ display: "flex", gap: 8 }}>
              <Button variant="outline" icon="plus" size="sm">Connect bank</Button>
              <Button variant="outline" icon="plus" size="sm">Connect Stripe</Button>
            </div>
          </CardContent>
        </Card>
        <Card>
          <CardHeader>
            <CardTitle>Automation</CardTitle>
            <CardDescription>How much the AI does on its own</CardDescription>
          </CardHeader>
          <CardContent style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            {[
              ["Auto-categorize with AI", "High-confidence matches post automatically", true],
              ["Apply my rules first", "Rules always beat AI suggestions", true],
              ["Weekly summary email", "A short health report every Monday", false],
            ].map(([label, desc, on]) => (
              <div key={label} style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: "var(--text-sm)", fontWeight: 500 }}>{label}</div>
                  <div style={{ fontSize: "var(--text-xs)", color: "var(--text-muted)" }}>{desc}</div>
                </div>
                <Switch defaultChecked={on} />
              </div>
            ))}
          </CardContent>
        </Card>
      </div>
    </div>
  );
}

function App() {
  const [screen, setScreen] = React.useState(localStorage.getItem("obds-kit-screen") || "dashboard");
  const [inboxCount, setInboxCount] = React.useState(3);
  const go = (id) => { setScreen(id); localStorage.setItem("obds-kit-screen", id); };

  const screens = {
    dashboard: <window.OBDashboard onNavigate={go} inboxCount={inboxCount} />,
    inbox: <window.OBInbox count={inboxCount} setCount={setInboxCount} />,
    transactions: <window.OBTransactions />,
    income: <window.OBTransactions mode="income" />,
    expenses: <window.OBTransactions mode="expenses" />,
    cashflow: <window.OBCashFlow />,
    reports: <window.OBReports />,
    settings: <OBSettings />,
  };

  return (
    <div className="ob-app">
      <SideNav
        logoSrc="../../assets/logo/openbooks-mark.png"
        activeId={screen}
        onSelect={go}
        items={[
          { id: "dashboard", label: "Dashboard", icon: "layout-dashboard" },
          { id: "inbox", label: "Inbox", icon: "inbox", count: inboxCount || undefined },
          { section: "Money" },
          { id: "transactions", label: "Transactions", icon: "receipt" },
          { id: "income", label: "Income", icon: "arrow-up-right" },
          { id: "expenses", label: "Expenses", icon: "arrow-down-right" },
          { id: "cashflow", label: "Cash flow", icon: "chart-column" },
          { section: "Insights" },
          { id: "reports", label: "Reports", icon: "file-text" },
        ]}
        footerItems={[{ id: "settings", label: "Settings", icon: "settings" }]}
      />
      <main className="ob-main" data-screen-label={screen}>
        {screens[screen] || screens.dashboard}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
