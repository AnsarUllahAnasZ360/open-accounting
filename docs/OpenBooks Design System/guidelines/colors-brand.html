<!-- @dsCard group="Colors" viewport="700x150" name="Brand green" subtitle="--ob-green ramp — primary is 500" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
</head>
<body style="margin:0;padding:16px;">
<div style="display:grid;grid-template-columns:repeat(10,1fr);gap:6px;">
  <div style="display:flex;flex-direction:column;gap:4px;"><div style="height:64px;border-radius:8px;background:var(--ob-green-50);box-shadow:inset 0 0 0 1px rgb(0 0 0 / 0.04);"></div><span style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono);">50</span></div>
  <div style="display:flex;flex-direction:column;gap:4px;"><div style="height:64px;border-radius:8px;background:var(--ob-green-100);"></div><span style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono);">100</span></div>
  <div style="display:flex;flex-direction:column;gap:4px;"><div style="height:64px;border-radius:8px;background:var(--ob-green-200);"></div><span style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono);">200</span></div>
  <div style="display:flex;flex-direction:column;gap:4px;"><div style="height:64px;border-radius:8px;background:var(--ob-green-300);"></div><span style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono);">300</span></div>
  <div style="display:flex;flex-direction:column;gap:4px;"><div style="height:64px;border-radius:8px;background:var(--ob-green-400);"></div><span style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono);">400</span></div>
  <div style="display:flex;flex-direction:column;gap:4px;"><div style="height:64px;border-radius:8px;background:var(--ob-green-500);box-shadow:0 0 0 2px var(--background),0 0 0 3.5px var(--ob-green-500);"></div><span style="font-size:11px;color:var(--foreground);font-weight:600;font-family:var(--font-mono);">500 ★</span></div>
  <div style="display:flex;flex-direction:column;gap:4px;"><div style="height:64px;border-radius:8px;background:var(--ob-green-600);"></div><span style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono);">600</span></div>
  <div style="display:flex;flex-direction:column;gap:4px;"><div style="height:64px;border-radius:8px;background:var(--ob-green-700);"></div><span style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono);">700</span></div>
  <div style="display:flex;flex-direction:column;gap:4px;"><div style="height:64px;border-radius:8px;background:var(--ob-green-800);"></div><span style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono);">800</span></div>
  <div style="display:flex;flex-direction:column;gap:4px;"><div style="height:64px;border-radius:8px;background:var(--ob-green-900);"></div><span style="font-size:11px;color:var(--text-muted);font-family:var(--font-mono);">900</span></div>
</div>
</body>
</html>
