<!-- @dsCard group="Spacing" viewport="700x150" name="Shadows" subtitle="xs on cards · md on popovers · never glows" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
</head>
<body style="margin:0;padding:20px;background:var(--surface-sunken);display:flex;gap:20px;">
<div style="flex:1;display:flex;flex-direction:column;gap:6px;"><div style="height:72px;border-radius:var(--radius-card);background:var(--card);box-shadow:var(--card-ring),var(--shadow-xs);"></div><span style="font-size:11px;color:var(--text-muted);">xs + ring · cards</span></div>
<div style="flex:1;display:flex;flex-direction:column;gap:6px;"><div style="height:72px;border-radius:var(--radius-card);background:var(--card);box-shadow:var(--shadow-sm);"></div><span style="font-size:11px;color:var(--text-muted);">sm · active tab</span></div>
<div style="flex:1;display:flex;flex-direction:column;gap:6px;"><div style="height:72px;border-radius:var(--radius-card);background:var(--card);box-shadow:var(--shadow-md);"></div><span style="font-size:11px;color:var(--text-muted);">md · popovers, menus</span></div>
<div style="flex:1;display:flex;flex-direction:column;gap:6px;"><div style="height:72px;border-radius:var(--radius-card);background:var(--card);box-shadow:var(--shadow-lg);"></div><span style="font-size:11px;color:var(--text-muted);">lg · dialogs only</span></div>
</body>
</html>
