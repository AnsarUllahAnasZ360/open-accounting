<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
</head>
<body style="margin:0;padding:16px;">
<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;">
  <div style="display:flex;flex-direction:column;gap:4px;"><div style="height:64px;border-radius:8px;background:var(--background);box-shadow:inset 0 0 0 1px rgb(0 0 0 / 0.06);"></div><span style="font-size:11px;color:var(--text-muted);">background</span></div>
  <div style="display:flex;flex-direction:column;gap:4px;"><div style="height:64px;border-radius:8px;background:var(--surface-sunken);box-shadow:inset 0 0 0 1px rgb(0 0 0 / 0.04);"></div><span style="font-size:11px;color:var(--text-muted);">sunken</span></div>
  <div style="display:flex;flex-direction:column;gap:4px;"><div style="height:64px;border-radius:8px;background:var(--muted);"></div><span style="font-size:11px;color:var(--text-muted);">muted</span></div>
  <div style="display:flex;flex-direction:column;gap:4px;"><div style="height:64px;border-radius:8px;background:var(--border);"></div><span style="font-size:11px;color:var(--text-muted);">border</span></div>
  <div style="display:flex;flex-direction:column;gap:4px;"><div style="height:64px;border-radius:8px;background:var(--muted-foreground);"></div><span style="font-size:11px;color:var(--text-muted);">muted-fg</span></div>
  <div style="display:flex;flex-direction:column;gap:4px;"><div style="height:64px;border-radius:8px;background:var(--text-secondary);"></div><span style="font-size:11px;color:var(--text-muted);">secondary</span></div>
  <div style="display:flex;flex-direction:column;gap:4px;"><div style="height:64px;border-radius:8px;background:var(--foreground);"></div><span style="font-size:11px;color:var(--text-muted);">foreground</span></div>
</div>
</body>
</html>
