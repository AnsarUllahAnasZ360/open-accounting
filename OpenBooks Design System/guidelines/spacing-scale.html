<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="4px grid — card pad 16, page gutter 24, grid gap 16" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
</head>
<body style="margin:0;padding:16px;">
<div style="display:flex;flex-direction:column;gap:8px;">
  <div style="display:flex;align-items:center;gap:12px;"><div style="width:4px;height:16px;background:var(--ob-green-500);border-radius:2px;"></div><span style="font-size:11px;font-family:var(--font-mono);color:var(--text-muted);">1 · 4px — icon-to-text micro gaps</span></div>
  <div style="display:flex;align-items:center;gap:12px;"><div style="width:8px;height:16px;background:var(--ob-green-500);border-radius:2px;"></div><span style="font-size:11px;font-family:var(--font-mono);color:var(--text-muted);">2 · 8px — between buttons, table cell pad</span></div>
  <div style="display:flex;align-items:center;gap:12px;"><div style="width:16px;height:16px;background:var(--ob-green-500);border-radius:2px;"></div><span style="font-size:11px;font-family:var(--font-mono);color:var(--text-muted);">4 · 16px — card padding, grid gaps</span></div>
  <div style="display:flex;align-items:center;gap:12px;"><div style="width:24px;height:16px;background:var(--ob-green-500);border-radius:2px;"></div><span style="font-size:11px;font-family:var(--font-mono);color:var(--text-muted);">6 · 24px — page gutters, section gaps</span></div>
  <div style="display:flex;align-items:center;gap:12px;"><div style="width:32px;height:16px;background:var(--ob-green-500);border-radius:2px;"></div><span style="font-size:11px;font-family:var(--font-mono);color:var(--text-muted);">8 · 32px — page top padding</span></div>
</div>
</body>
</html>
