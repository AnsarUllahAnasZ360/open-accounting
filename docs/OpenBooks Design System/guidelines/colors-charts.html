<!-- @dsCard group="Colors" viewport="700x140" name="Chart palette" subtitle="series order: green, teal, amber, slate, red" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
</head>
<body style="margin:0;padding:16px;">
<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:6px;align-items:end;">
  <div style="display:flex;flex-direction:column;gap:4px;"><div style="height:56px;border-radius:6px 6px 2px 2px;background:var(--chart-1);"></div><span style="font-size:11px;color:var(--text-muted);">1 · primary</span></div>
  <div style="display:flex;flex-direction:column;gap:4px;"><div style="height:44px;border-radius:6px 6px 2px 2px;background:var(--chart-2);"></div><span style="font-size:11px;color:var(--text-muted);">2 · secondary</span></div>
  <div style="display:flex;flex-direction:column;gap:4px;"><div style="height:38px;border-radius:6px 6px 2px 2px;background:var(--chart-3);"></div><span style="font-size:11px;color:var(--text-muted);">3 · projected</span></div>
  <div style="display:flex;flex-direction:column;gap:4px;"><div style="height:30px;border-radius:6px 6px 2px 2px;background:var(--chart-4);"></div><span style="font-size:11px;color:var(--text-muted);">4 · prior period</span></div>
  <div style="display:flex;flex-direction:column;gap:4px;"><div style="height:24px;border-radius:6px 6px 2px 2px;background:var(--chart-5);"></div><span style="font-size:11px;color:var(--text-muted);">5 · outflow</span></div>
  <div style="display:flex;flex-direction:column;gap:4px;"><div style="height:16px;border-radius:6px 6px 2px 2px;background:var(--chart-grid);"></div><span style="font-size:11px;color:var(--text-muted);">grid</span></div>
</div>
</body>
</html>
