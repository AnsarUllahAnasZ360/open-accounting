<!-- @dsCard group="Colors" viewport="700x170" name="Money semantics" subtitle="positive / negative / warning / info / ai — text + surface pairs" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  .chip { display:flex; flex-direction:column; gap:6px; padding:12px; border-radius:10px; }
  .chip b { font-size:13px; font-weight:600; }
  .chip span { font-size:11px; font-family:var(--font-mono); opacity:0.75; }
  .amt { font-family:var(--font-figures); font-feature-settings:"tnum" 1; font-size:15px; font-weight:500; }
</style>
</head>
<body style="margin:0;padding:16px;">
<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;">
  <div class="chip" style="background:var(--positive-surface);color:var(--positive);">
    <b>Positive</b><span class="amt">+$5,500.00</span><span>income · posted</span>
  </div>
  <div class="chip" style="background:var(--negative-surface);color:var(--negative);">
    <b>Negative</b><span class="amt">−$1,850.00</span><span>expense · overdue</span>
  </div>
  <div class="chip" style="background:var(--warning-surface);color:var(--warning);">
    <b>Warning</b><span class="amt">14 items</span><span>needs review</span>
  </div>
  <div class="chip" style="background:var(--info-surface);color:var(--info);">
    <b>Info</b><span class="amt">Synced</span><span>account states</span>
  </div>
  <div class="chip" style="background:var(--ai-surface);color:var(--ai);">
    <b>AI</b><span class="amt">✦ proposes</span><span>green, never purple</span>
  </div>
</div>
<p style="margin-top:10px;font-size:12px;color:var(--text-muted);">Negative amounts use a true minus sign (−). Surfaces are for badges and row tints only.</p>
</body>
</html>
